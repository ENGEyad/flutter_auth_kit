name: flutter_auth_kit
description: A Flutter package for managing authentication via email or phone number, including OTP, forgot/reset password, login, and registration.
version: 0.1.0
homepage: https://github.com/your-username/flutter_auth_kit

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.5.2
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
